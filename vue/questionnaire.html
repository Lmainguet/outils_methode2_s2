<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Questionnaire</title>
    <link rel="stylesheet" href="../style.css">
    

</head>
<body id="questionnairePage">
    <header id="questionnaireTitle">QUESTIONNAIRE</header>

    <main>
        <form action="page_suivante.html" method="get">
            <!-- Âge -->
            <label for="age">Votre âge :</label>
            <input type="number" id="age" name="age" min="1" max="120" required><br><br>

            <!-- Sexe -->
            <label for="sexe">Votre sexe :</label><br>
            <select id="sexe" name="sexe" required>
                <option value="">--Sélectionnez--</option>
                <option value="1">Femme</option>
                <option value="2">Homme</option>
            </select><br>

            <!-- Ordi -->
            <label for="Ordi">Etes vous sur un ordinateur ?</label><br>
            <select id="Ordi" name="Ordi" required>
                <option value="">--Sélectionnez--</option>
                <option value="1">Oui</option>
                <option value="0">Non</option>
            </select><br>

            <!-- Vue -->
            <label for="Vue">Avez vous des problèmes de vue ?</label><br>
            <select id="Vue" name="Vue" required>
                <option value="">--Sélectionnez--</option>
                <option value="1">Oui</option>
                <option value="0">Non</option>
            </select><br>

            <!-- Filtre -->
            <label for="filtre">Avez vous un filtre agissant sur votre écran ?</label><br>
            <select id="filtre" name="filtre" required>
                <option value="">--Sélectionnez--</option>
                <option value="1">Oui</option>
                <option value="0">Non</option>
            </select><br>

            <!-- Dyscalculie -->
            <label for="dyscalculie">Etes vous dyscalculique ? </label><br>
            <select id="dyscalculie" name="dyscalculie" required>
                <option value="">--Sélectionnez--</option>
                <option value="1">Oui</option>
                <option value="0">Non</option>
            </select><br><br>
        </form>

        <!-- Bouton -->
        <a href="regles.html" id="questionnaire_start_button">Valider</a>
    </main>
    <script src="../model/questionnaire.js"></script>
</body>
</html>
